services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sip_snug_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: NTI
      DB_USERNAME: root
      DB_PASSWORD: secretpassword
      SANCTUM_STATEFUL_DOMAINS: "127.0.0.1:8000,127.0.0.1:8001,localhost:8000,localhost:8001,localhost,127.0.0.1"
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - sip_snug_network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: sip_snug_webserver
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sip_snug_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: sip_snug_db
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: NTI
      MYSQL_ROOT_PASSWORD: secretpassword
      MYSQL_PASSWORD: secretpassword
      MYSQL_USER: sip_snug
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sip_snug_network

networks:
  sip_snug_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
